<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZFW FDU Airport Locator Login</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #156082;
      --error: #b91c1c;
      --border: #cbd5e1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #156082 100%);
      color: var(--text);
    }

    #loginPage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      padding: 32px;
    }

    .login-card h1 {
      margin: 0 0 8px;
      font-size: 1.75rem;
      line-height: 1.2;
      color: var(--text);
      text-align: center;
    }

    .login-card p {
      margin: 0 0 24px;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 14px 0 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
    }

    input:focus {
      outline: 3px solid rgba(21, 96, 130, 0.22);
      border-color: var(--accent);
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 12px 14px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(0.94);
    }

    #loginError {
      display: none;
      margin-top: 14px;
      color: var(--error);
      font-weight: 700;
      text-align: center;
    }

    #appContent {
      display: none;
    }

    .logout-wrap {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
    }

    .logout-wrap button {
      width: auto;
      margin: 0;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      background: #334155;
    }
  </style>
</head>
<body>
  <section id="loginPage">
    <form class="login-card" id="loginForm" autocomplete="off">
      <h1>ZFW FDU Airport Locator</h1>
      <p>Authorized access only</p>

      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <button type="submit">Login</button>
      <div id="loginError">Invalid username or password.</div>
    </form>
  </section>

  <main id="appContent">
    <div class="logout-wrap">
      <button type="button" id="logoutButton">Logout</button>
    </div>

    <!-- Put your existing site/app HTML below this line. -->
    <h1 style="padding: 32px; color: #0f172a;">ZFW FDU Airport Locator</h1>
    <!-- Put your existing site/app HTML above this line. -->
  </main>

  <script>
    const VALID_USERNAME = "ZFW";
    const VALID_PASSWORD = "ZFWCD";
    const SESSION_KEY = "zfwAirportLocatorLoggedIn";

    const loginPage = document.getElementById("loginPage");
    const appContent = document.getElementById("appContent");
    const loginForm = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");
    const logoutButton = document.getElementById("logoutButton");

    function showApp() {
      loginPage.style.display = "none";
      appContent.style.display = "block";
    }

    function showLogin() {
      loginPage.style.display = "flex";
      appContent.style.display = "none";
    }

    if (sessionStorage.getItem(SESSION_KEY) === "true") {
      showApp();
    } else {
      showLogin();
    }

    loginForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (username === VALID_USERNAME && password === VALID_PASSWORD) {
        sessionStorage.setItem(SESSION_KEY, "true");
        loginError.style.display = "none";
        showApp();
      } else {
        sessionStorage.removeItem(SESSION_KEY);
        loginError.style.display = "block";
      }
    });

    logoutButton.addEventListener("click", function () {
      sessionStorage.removeItem(SESSION_KEY);
      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
      showLogin();
    });
  </script>
</body>
</html>
